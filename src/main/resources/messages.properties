# ===============================================
# Exception Handler Messages
# ===============================================

exception.illegal-argument=An invalid argument was provided.
exception.authorization-denied=You don't have permission to access this resource. Please verify your credentials.
exception.water-intake.not-found=The requested water intake record was not found.
exception.water-intake.duplicate-datetime=A record already exists for the specified date and time.
exception.user.not-found=The requested user account was not found.
exception.user.already-exists=A user with this email address already exists.
exception.runtime-configuration=Failed to apply runtime configuration change. Please verify the provided values and try again.
exception.internal-server-error=An unexpected error occurred. Please try again later or contact support.
exception.keycloak.unavailable=The identity provider is temporarily unavailable. Please try again later.
exception.insufficient-scope=The access token does not contain the required scope for this operation.
exception.parsing-error=Unable to process the request. Please check that your data is properly formatted.
exception.rate-limit-exceeded=Too many requests. Please wait before trying again.

