api:
  versioning:
    current-version: v1
    versions:
      - version: v1
        deprecated: false
        sunset: ""
        successor-version: ""

server:
  port: 8081

server-config:
  port: 8081
  error-stacktrace-policy: never

jackson-config:
  timeZone: UTC
  serialization:
    writeDatesAsTimestamps: false

spring:
  application:
    name: drink-water-api
  web:
    error:
      include-stacktrace: never
  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: jdbc:h2:mem:drink_water_db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: false
    baseline-on-migrate: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/drinkwater
          jwk-set-uri: http://localhost:8080/realms/drinkwater/protocol/openid-connect/certs
  messages:
    cache-duration: 0s

database:
  url: jdbc:h2:mem:drink_water_db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;DATABASE_TO_LOWER=TRUE
  username: sa
  password: password_h2
  driver-class-name: org.h2.Driver
  pool-size: 5
  min-idle: 1
  connection-timeout: 30000

cache:
  user-id-by-public-id:
    max-size: 1000
    expire-after-write-minutes: 5

webhook:
  secret: test-webhook-secret

keycloak:
  url: http://localhost:8080
  realm: drinkwater
  clientId: drinkwaterapp
  username: admin-drinkwater
  password: password

cors:
  allowed-origin: http://localhost:3000

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      show-components: always
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    root: WARN
    br.com.drinkwater: INFO
