# =============================================================================
# GRAFANA DASHBOARD PROVISIONING
# =============================================================================
# Points Grafana to the dashboards folder for automatic loading.

apiVersion: 1

providers:
  - name: "default"
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
